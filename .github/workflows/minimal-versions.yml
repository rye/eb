name: Minimal Versions

on:
  workflow_dispatch:

jobs:
  msrv:
    name: Verify the declared MSRV
    runs-on: ubuntu-latest
    steps:
      - name: Install cargo-msrv
        run: cargo install cargo-msrv --locked
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Verify the crate builds on the declared rust-version
        run: cargo msrv verify

  minimal-versions:
    name: Check minimal dependency versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly, 1.88]
    steps:
      - name: Install nightly (needed to resolve -Z minimal-versions)
        run: rustup toolchain install nightly
      - name: Install cargo-hack and cargo-minimal-versions
        run: cargo +nightly install cargo-hack cargo-minimal-versions --locked
      - name: Install and select the toolchain under test
        run: |
          rustup toolchain install ${{ matrix.rust }}
          rustup default ${{ matrix.rust }}
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Check with minimal dependency versions across the feature powerset
        run: cargo minimal-versions check --workspace --feature-powerset --all-targets
      - name: Test with minimal dependency versions across the feature powerset
        run: cargo minimal-versions test --workspace --feature-powerset --all-targets --no-fail-fast
